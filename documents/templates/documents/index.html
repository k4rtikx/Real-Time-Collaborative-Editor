<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room {{ group_name }} — Live Document</title>
    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --paper: #F6F3EC;
            --paper-line: #E4DECD;
            --ink: #1C1F22;
            --ink-soft: #5B6066;
            --ink-faint: #9A968A;
            --coral: #E2543D;
            --teal: #2C8C82;
            --card-bg: #FFFEFB;
            --line: #DCD5C4;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--paper);
            background-image: repeating-linear-gradient(to bottom, transparent 0px, transparent 35px, var(--paper-line) 36px);
            color: var(--ink);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        .page {
            max-width: 880px;
            margin: 0 auto;
            padding: 36px 24px 60px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
        }

        .room-label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--ink-faint);
            margin: 0 0 6px;
        }

        h1.room-title {
            font-family: 'Fraunces', serif;
            font-weight: 600;
            font-size: 28px;
            margin: 0;
            word-break: break-all;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .presence {
            display: flex;
            align-items: center;
            gap: 7px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12.5px;
            color: var(--ink-soft);
            background: var(--card-bg);
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 7px 14px;
        }

        .presence .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--teal);
            box-shadow: 0 0 0 0 rgba(44, 140, 130, 0.5);
            animation: pulse 2.2s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(44, 140, 130, 0.45);
            }

            70% {
                box-shadow: 0 0 0 6px rgba(44, 140, 130, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(44, 140, 130, 0);
            }
        }

        #copyLinkBtn {
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 13px;
            background: transparent;
            color: var(--ink);
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 8px 16px;
            cursor: pointer;
            transition: border-color 0.15s ease, color 0.15s ease;
        }

        #copyLinkBtn:hover {
            border-color: var(--ink);
        }

        #copyLinkBtn.copied {
            border-color: var(--teal);
            color: var(--teal);
        }

        .editor-card {
            background: var(--card-bg);
            border: 1px solid var(--line);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 1px 2px rgba(28, 31, 34, 0.04);
        }

        /* --- Quill overrides: quiet, paper-toned toolbar --- */
        .ql-toolbar.ql-snow {
            border: none;
            border-bottom: 1px solid var(--line);
            background: #FBFAF6;
            padding: 10px 14px;
        }

        .ql-container.ql-snow {
            border: none;
            font-family: 'Inter', sans-serif;
            font-size: 15.5px;
        }

        #editor {
            height: 480px;
            background: var(--card-bg);
            color: var(--ink);
            line-height: 1.65;
        }

        .ql-snow .ql-stroke {
            stroke: var(--ink-soft);
        }

        .ql-snow .ql-fill {
            fill: var(--ink-soft);
        }

        .ql-snow .ql-picker {
            color: var(--ink-soft);
        }

        .ql-toolbar.ql-snow .ql-formats button:hover .ql-stroke,
        .ql-toolbar.ql-snow .ql-formats button.ql-active .ql-stroke {
            stroke: var(--coral);
        }

        .ql-toolbar.ql-snow .ql-formats button:hover .ql-fill,
        .ql-toolbar.ql-snow .ql-formats button.ql-active .ql-fill {
            fill: var(--coral);
        }

        .ql-toolbar.ql-snow .ql-formats button.ql-active,
        .ql-toolbar.ql-snow .ql-formats button:hover {
            color: var(--coral);
        }

        .ql-editor.ql-blank::before {
            color: var(--ink-faint);
            font-style: normal;
        }

        footer {
            text-align: center;
            margin-top: 28px;
        }

        footer p {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.04em;
            color: var(--ink-faint);
            margin: 0;
        }

        @media (max-width: 560px) {
            .page {
                padding-top: 24px;
            }

            #editor {
                height: 360px;
            }

            h1.room-title {
                font-size: 21px;
            }
        }
    </style>
</head>

<body>

    <div class="page">
        <div class="topbar">
            <div>
                <p class="room-label">Live document</p>
                <h1 class="room-title">{{ group_name }}</h1>
            </div>
            <div class="topbar-right">
                <div class="presence">
                    <span class="dot"></span>
                    <span id="online-count">0</span>&nbsp;online
                </div>
                <button id="copyLinkBtn">Copy link</button>
            </div>
        </div>

        <div class="editor-card">
            <div id="editor"></div>
        </div>

        <footer>
            <p>Django · Channels · Redis · WebSockets · PostgreSQL</p>
        </footer>
    </div>

    {{ group_name|json_script:"group-name" }}
    {{ docs_json|json_script:"doc-data" }}

    <script>
        const groupName = JSON.parse(document.getElementById("group-name").textContent);
        const docData = JSON.parse(document.getElementById("doc-data").textContent);

        const quill = new Quill("#editor", {
            theme: "snow",
            placeholder: "Start writing…",
            modules: {
                toolbar: [
                    [{ header: [1, 2, 3, false] }],
                    ["bold", "italic", "underline"],
                    [{ list: "ordered" }, { list: "bullet" }],
                    ["clean"]
                ]
            }
        });

        if (docData.content) {
            quill.clipboard.dangerouslyPasteHTML(docData.content);
        }

        const protocol = window.location.protocol === "https:" ? "wss://" : "ws://";
        const socket = new WebSocket(
            protocol + window.location.host + "/ws/editor/" + groupName + "/"
        );

        socket.onopen = function () {
            console.log("WebSocket Connected");
        };

        let isRemoteUpdate = false;

        quill.on("text-change", function (delta, oldDelta, source) {
            if (source === "user" && !isRemoteUpdate) {
                socket.send(quill.root.innerHTML);
            }
        });

        socket.onmessage = function (event) {
            const data = JSON.parse(event.data);

            if (data.type === "count") {
                document.getElementById("online-count").innerText = data.count;
            }

            else if (data.type === "editor") {
                if (data.message !== quill.root.innerHTML) {
                    isRemoteUpdate = true;                    // ✅ CHANGE: flag before
                    const selection = quill.getSelection();  // ✅ save cursor
                    quill.clipboard.dangerouslyPasteHTML(data.message);
                    if (selection) {
                        quill.setSelection(selection);       // ✅ restore cursor
                    }
                    isRemoteUpdate = false;                  // ✅ flag after
                }
            }
        };

        // --- Copy room link ---
        const copyBtn = document.getElementById("copyLinkBtn");
        copyBtn.addEventListener("click", () => {
            navigator.clipboard.writeText(window.location.href).then(() => {
                copyBtn.textContent = "Copied!";
                copyBtn.classList.add("copied");
                setTimeout(() => {
                    copyBtn.textContent = "Copy link";
                    copyBtn.classList.remove("copied");
                }, 1800);
            });
        });
    </script>

</body>

</html>
